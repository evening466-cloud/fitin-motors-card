<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>og</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:1200px; height:630px; overflow:hidden;}
  body{
    background:#0c0c0d;
    font-family:'Malgun Gothic','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    position:relative;
  }
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 2px, transparent 2px, transparent 16px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 2px, transparent 2px, transparent 16px);
  }
  body::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at 50% 35%, rgba(255,255,255,0.06), transparent 60%);
  }
  .checker-top, .checker-bottom{
    position:absolute; left:0; right:0; height:16px;
    background-image:repeating-conic-gradient(#38383a 0% 25%, #0c0c0d 0% 50%);
    background-size:20px 20px;
  }
  .checker-top{top:0;}
  .checker-bottom{bottom:0;}

  .wrap{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:22px;
  }
  .badge{
    width:120px; height:120px;
    border-radius:50%;
    background:linear-gradient(145deg,#38383a,#2a2a2c);
    border:4px solid #e8321c;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
  }
  .badge svg{width:60px; height:60px; stroke:#e8321c;}
  .name{
    font-size:88px;
    font-weight:900;
    letter-spacing:4px;
    color:#f2f2f0;
    text-transform:uppercase;
    text-shadow:0 4px 12px rgba(0,0,0,0.6);
  }
  .category{
    display:inline-block;
    padding:10px 28px;
    font-size:26px;
    font-weight:700;
    letter-spacing:2px;
    color:#e8321c;
    border:2px solid #a3170a;
    border-radius:40px;
    background:rgba(232,50,28,0.1);
  }
  .slogan{
    font-size:30px;
    font-weight:700;
    color:#9a9a9c;
    letter-spacing:0.5px;
  }
</style>
</head>
<body>
  <div class="checker-top"></div>
  <div class="checker-bottom"></div>
  <div class="wrap">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <div class="name">피트인</div>
    <div class="category">자동차정비 · 수리</div>
    <div class="slogan">당신의 차, 완벽하게 책임집니다</div>
  </div>
</body>
</html>
