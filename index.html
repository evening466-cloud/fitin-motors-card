<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>피트인 자동차정비소</title>

<meta property="og:type" content="website">
<meta property="og:title" content="피트인 자동차정비소">
<meta property="og:description" content="당신의 차, 완벽하게 책임집니다 — 전화, 카카오톡, 길찾기를 한 번에.">
<meta property="og:image" content="https://evening466-cloud.github.io/fitin-motors-card/og-image.png">
<meta property="og:url" content="https://evening466-cloud.github.io/fitin-motors-card/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="피트인 자동차정비소">
<meta name="twitter:description" content="당신의 차, 완벽하게 책임집니다 — 전화, 카카오톡, 길찾기를 한 번에.">
<meta name="twitter:image" content="https://evening466-cloud.github.io/fitin-motors-card/og-image.png">
<style>
  /* =========================================================
     기본 색상 변수 (JS의 CONFIG.colors 값으로 런타임에 덮어씌워집니다)
     ========================================================= */
  :root{
    --bg-dark:#0c0c0d;
    --bg-card:#161616;
    --bg-panel:#1c1c1e;
    --accent:#e8321c;
    --accent-dark:#a3170a;
    --metal:#2a2a2c;
    --metal-light:#38383a;
    --text:#f2f2f0;
    --text-muted:#9a9a9c;
    --border:#2c2c2e;
    --kakao:#fee500;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg-dark);
    color:var(--text);
    font-family:'Malgun Gothic','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }

  /* 타이어 트레드 패턴 배경 (은은하게) */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 2px, transparent 2px, transparent 14px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 14px);
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.05), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  .card{
    position:relative;
    z-index:1;
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    padding:22px 18px 28px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  /* ---------- 체크무늬 구분선 ---------- */
  .checker{
    height:10px;
    width:100%;
    border-radius:3px;
    background-image:
      repeating-conic-gradient(var(--metal-light) 0% 25%, var(--bg-dark) 0% 50%);
    background-size:14px 14px;
    opacity:0.9;
  }
  .checker.thin{height:6px; background-size:10px 10px;}

  /* ---------- 헤더 ---------- */
  .hero{
    text-align:center;
    padding:10px 0 4px;
  }
  .badge-icon{
    width:56px; height:56px;
    margin:0 auto 10px;
    border-radius:50%;
    background:linear-gradient(145deg, var(--metal-light), var(--metal));
    border:2px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.03);
  }
  .badge-icon svg{width:28px; height:28px; stroke:var(--accent);}

  .biz-name{
    margin:0;
    font-size:30px;
    font-weight:900;
    letter-spacing:1px;
    color:var(--text);
    text-transform:uppercase;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
  }
  .slogan{
    margin:12px 0 0;
    font-size:14px;
    font-weight:700;
    color:var(--text-muted);
    letter-spacing:0.3px;
  }

  /* ---------- 액션 버튼 ---------- */
  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    min-height:58px;
    padding:0 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:800;
    letter-spacing:0.5px;
    text-decoration:none;
    color:var(--text);
    background:var(--metal);
    border:1px solid var(--border);
    transition:transform 0.08s ease, filter 0.15s ease;
  }
  .btn:active{transform:scale(0.97); filter:brightness(0.92);}
  .btn-icon{
    width:34px; height:34px;
    flex:0 0 auto;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .btn-icon svg{width:18px; height:18px;}
  .btn-text{display:flex; flex-direction:column; align-items:flex-start; gap:1px;}
  .btn-sub{font-size:11px; font-weight:600; color:var(--text-muted);}

  .btn-primary{
    background:linear-gradient(180deg, var(--accent), var(--accent-dark));
    border-color:var(--accent-dark);
    box-shadow:0 6px 16px rgba(232,50,28,0.35);
  }
  .btn-primary .btn-icon{background:rgba(255,255,255,0.18);}
  .btn-primary .btn-icon svg{stroke:#fff;}
  .btn-primary .btn-sub{color:rgba(255,255,255,0.75);}

  .btn-kakao .btn-icon{background:var(--kakao);}
  .btn-kakao .btn-icon svg{stroke:#3c1e1e;}
  .btn-kakao.is-disabled{opacity:0.55;}

  .btn-map .btn-icon{background:var(--metal-light); border:1px solid var(--accent-dark);}
  .btn-map .btn-icon svg{stroke:var(--accent);}

  /* ---------- 패널 공통 ---------- */
  .panel{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
  }
  .panel-title{
    display:flex;
    align-items:center;
    gap:8px;
    margin:0 0 10px;
    font-size:13px;
    font-weight:800;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
  }
  .panel-title svg{width:16px; height:16px; stroke:var(--accent);}
  .panel-text{
    margin:0;
    font-size:14px;
    font-weight:700;
    line-height:1.5;
    color:var(--text);
  }

  /* ---------- 영업시간 ---------- */
  .hours-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:7px 0;
    font-size:14px;
    border-bottom:1px dashed var(--border);
  }
  .hours-row:last-child{border-bottom:none;}
  .hours-day{font-weight:700; color:var(--text);}
  .hours-time{font-weight:700; color:var(--text-muted);}
  .hours-row.is-closed .hours-time{color:var(--accent);}

  /* ---------- 업무 목록 ---------- */
  .services-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
  }
  .service-chip{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 10px;
    background:var(--metal);
    border-left:3px solid var(--accent);
    border-radius:6px;
    font-size:13px;
    font-weight:700;
  }
  .service-icon{font-size:17px; line-height:1;}

  /* ---------- 하단 안내 ---------- */
  .notice{
    display:flex;
    gap:9px;
    align-items:flex-start;
    padding:12px 14px;
    background:rgba(255,255,255,0.03);
    border:1px dashed var(--border);
    border-radius:8px;
    font-size:12px;
    color:var(--text-muted);
    line-height:1.5;
  }
  .notice svg{width:15px; height:15px; stroke:var(--accent); flex:0 0 auto; margin-top:1px;}

  .footer-mark{
    text-align:center;
    font-size:11px;
    color:var(--text-muted);
    letter-spacing:1px;
    opacity:0.6;
    margin-top:2px;
  }

  /* ---------- 토스트 ---------- */
  #toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%) translateY(20px);
    background:var(--accent);
    color:#fff;
    font-size:13px;
    font-weight:700;
    padding:12px 20px;
    border-radius:30px;
    box-shadow:0 6px 20px rgba(0,0,0,0.5);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:10;
    white-space:nowrap;
    max-width:88vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="card">

  <div class="hero">
    <div class="badge-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1 class="biz-name" id="bizName">피트인</h1>
    <p class="slogan" id="slogan">슬로건</p>
  </div>

  <div class="checker"></div>

  <div class="actions">
    <a href="#" id="callBtn" class="btn btn-primary">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </span>
      <span class="btn-text">
        <span>정비문의</span>
        <span class="btn-sub" id="phoneDisplay">010-0000-0000</span>
      </span>
    </a>

    <button type="button" id="kakaoBtn" class="btn btn-kakao">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 20l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </span>
      <span class="btn-text">
        <span>카카오톡 문의</span>
        <span class="btn-sub" id="kakaoIdText">카카오톡 ID</span>
      </span>
    </button>

    <button type="button" id="mapBtn" class="btn btn-map">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </span>
      <span class="btn-text">
        <span>길찾기</span>
        <span class="btn-sub" id="addressMain">주소</span>
      </span>
    </button>
  </div>

  <div class="panel">
    <p class="panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      영업시간
    </p>
    <div id="hoursList"></div>
  </div>

  <div class="panel">
    <p class="panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17h14M5 17a2 2 0 0 1-2-2v-2l2-5a2 2 0 0 1 2-1h10a2 2 0 0 1 2 1l2 5v2a2 2 0 0 1-2 2M5 17a2 2 0 0 0 4 0M15 17a2 2 0 0 0 4 0"/>
      </svg>
      정비 차종
    </p>
    <p class="panel-text" id="vehicleTypeText">정비 가능 차종</p>
  </div>

  <div class="panel">
    <p class="panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      취급 업무
    </p>
    <div class="services-grid" id="servicesList"></div>
  </div>

  <div class="checker thin"></div>

  <div class="notice">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
    </svg>
    <span id="noticeText">안내 문구</span>
  </div>

  <p class="footer-mark" id="footerMark">FIT-IN MOTORS</p>

</div>

<div id="toast"></div>

<script>
/* =========================================================
   CONFIG — 아래 값만 수정하면 명함 내용이 전부 반영됩니다.
   레이아웃(HTML/CSS)은 건드릴 필요가 없습니다.
   ========================================================= */
const CONFIG = {
  businessName: "피트인 자동차정비소",
  slogan: "당신의 차, 완벽하게 책임집니다",

  phone: "010-3525-4070",        // tel: 링크에 사용 (하이픈 포함 표기 가능)
  phoneDisplay: "010-3525-4070", // 버튼에 보여줄 표기

  kakaoId: "min-bj",             // 카카오톡 ID. 비워두면 버튼이 "준비중"으로 자동 전환됩니다.

  address: "가포산로 160",         // 카카오맵 길찾기 검색 및 화면 표시에 사용

  businessHours: [
    { day: "월~토",  time: "09:00 - 18:30" },
    { day: "일요일", time: "휴무", closed: true }
  ],

  vehicleTypeText: "수입차 · 국산차 모두 정비 가능합니다",

  services: [
    { icon: "🔧", name: "정기점검" },
    { icon: "🛢️", name: "오일교환" },
    { icon: "❄️", name: "에어컨 가스충전" },
    { icon: "🔋", name: "배터리 교체" },
    { icon: "🛠️", name: "각종 수리" }
  ],

  notice: "정확한 진단과 신속한 정비를 위해 예약 후 방문을 권장합니다.",
  footerMark: "FIT-IN MOTORS",

  colors: {
    bgDark:     "#0c0c0d",
    bgCard:     "#161616",
    bgPanel:    "#1c1c1e",
    accent:     "#e8321c",  // 포인트 컬러 (레드). 오렌지로 바꾸려면 예: "#ff6b00"
    accentDark: "#a3170a",
    metal:      "#2a2a2c",
    metalLight: "#38383a",
    text:       "#f2f2f0",
    textMuted:  "#9a9a9c",
    border:     "#2c2c2e",
    kakao:      "#fee500"
  }
};

/* =========================================================
   아래는 CONFIG 값을 화면에 반영하는 로직입니다.
   ========================================================= */
(function render(){

  // 1) 색상 변수 적용
  var root = document.documentElement.style;
  var c = CONFIG.colors;
  root.setProperty('--bg-dark', c.bgDark);
  root.setProperty('--bg-card', c.bgCard);
  root.setProperty('--bg-panel', c.bgPanel);
  root.setProperty('--accent', c.accent);
  root.setProperty('--accent-dark', c.accentDark);
  root.setProperty('--metal', c.metal);
  root.setProperty('--metal-light', c.metalLight);
  root.setProperty('--text', c.text);
  root.setProperty('--text-muted', c.textMuted);
  root.setProperty('--border', c.border);
  root.setProperty('--kakao', c.kakao);

  // 2) 텍스트 콘텐츠 적용
  document.getElementById('bizName').textContent = CONFIG.businessName;
  document.getElementById('slogan').textContent = CONFIG.slogan;
  document.getElementById('phoneDisplay').textContent = CONFIG.phoneDisplay || CONFIG.phone;
  document.getElementById('vehicleTypeText').textContent = CONFIG.vehicleTypeText;
  document.getElementById('noticeText').textContent = CONFIG.notice;
  document.getElementById('footerMark').textContent = CONFIG.footerMark;

  document.title = CONFIG.businessName;

  // 3) 전화 걸기
  var callBtn = document.getElementById('callBtn');
  callBtn.setAttribute('href', 'tel:' + CONFIG.phone.replace(/[^0-9+]/g, ''));

  // 4) 영업시간 렌더링
  var hoursList = document.getElementById('hoursList');
  hoursList.innerHTML = '';
  CONFIG.businessHours.forEach(function(h){
    var row = document.createElement('div');
    row.className = 'hours-row' + (h.closed ? ' is-closed' : '');
    row.innerHTML =
      '<span class="hours-day">' + h.day + '</span>' +
      '<span class="hours-time">' + h.time + '</span>';
    hoursList.appendChild(row);
  });

  // 5) 취급 업무 렌더링
  var servicesList = document.getElementById('servicesList');
  servicesList.innerHTML = '';
  CONFIG.services.forEach(function(s){
    var chip = document.createElement('div');
    chip.className = 'service-chip';
    chip.innerHTML =
      '<span class="service-icon">' + s.icon + '</span>' +
      '<span class="service-name">' + s.name + '</span>';
    servicesList.appendChild(chip);
  });

  // 6) 주소 표시 (길찾기 버튼 서브텍스트)
  document.getElementById('addressMain').textContent = CONFIG.address;

  // 7) 카카오톡 버튼 동작
  var kakaoBtn = document.getElementById('kakaoBtn');
  var kakaoIdText = document.getElementById('kakaoIdText');
  var hasKakaoId = CONFIG.kakaoId && CONFIG.kakaoId.trim().length > 0;

  if (hasKakaoId) {
    kakaoIdText.textContent = 'ID: ' + CONFIG.kakaoId;
    kakaoBtn.addEventListener('click', function(){
      copyToClipboard(CONFIG.kakaoId, function(){
        showToast('카카오톡 ID(' + CONFIG.kakaoId + ')가 복사되었습니다');
      });
    });
  } else {
    kakaoIdText.textContent = '카카오톡 ID 준비중';
    kakaoBtn.classList.add('is-disabled');
    kakaoBtn.addEventListener('click', function(){
      showToast('카카오톡 ID는 등록 준비 중입니다');
    });
  }

  // 8) 길찾기 버튼 동작 (카카오맵)
  document.getElementById('mapBtn').addEventListener('click', function(){
    var query = encodeURIComponent(CONFIG.address);
    window.open('https://map.kakao.com/link/search/' + query, '_blank');
  });

})();

/* ---------- 유틸: 클립보드 복사 ---------- */
function copyToClipboard(text, onSuccess){
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function(){
      fallbackCopy(text, onSuccess);
    });
  } else {
    fallbackCopy(text, onSuccess);
  }
}
function fallbackCopy(text, onSuccess){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch (e) {
    showToast('복사에 실패했습니다. 직접 입력해주세요: ' + text);
  }
  document.body.removeChild(ta);
}

/* ---------- 유틸: 토스트 알림 ---------- */
var toastTimer = null;
function showToast(msg){
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){
    toast.classList.remove('show');
  }, 2200);
}
</script>

</body>
</html>
